version: "3.8"

services:
  mt5-mcp:
    build: .
    image: lattice24/mt5-mcp:latest
    container_name: mt5-mcp-server
    environment:
      - MT5_BRIDGE_URL=http://host.docker.internal:8787
      - MT5_BRIDGE_API_KEY=${MT5_BRIDGE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    restart: unless-stopped
