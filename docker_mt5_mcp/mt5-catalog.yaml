mt5:
  name: mt5
  description: "MetaTrader 5 trading server — portable MCP bridge to MT5 terminals. Vendor: com.lattice24/mt5-trading"
  image: lattice24/mt5-mcp:latest
  env:
    MT5_BRIDGE_URL: http://host.docker.internal:8787
  metadata:
    vendor: com.lattice24
    extension: mt5-trading
    capabilities:
      - account
      - positions
      - orders
      - market_data
      - history
      - safety
