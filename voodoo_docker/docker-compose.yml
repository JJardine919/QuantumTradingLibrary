version: "3.8"

services:
  voodoo:
    build: .
    image: lattice24/voodoo:latest
    container_name: voodoo
    ports:
      - "8777:8777"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral
      - VOODOO_PORT=8777
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
